<form [formGroup]="filterForm" class="table-filters-row">

  <!-- Date Filter -->
  <div class="filter-group">
    <mat-icon class="filter-icon">event</mat-icon>
    <input type="date"
           formControlName="date"
           [max]="maxDate"
           class="filter-input">
  </div>

  <!-- Status Filter -->
  <div class="filter-group">
    <label>Status:</label>
    <select formControlName="status" class="filter-select">
      <option value="">All</option>
      <option value="UNASSIGNED">Unassigned</option>
      <option value="SCHEDULED">Scheduled</option>
      <option value="ON_ROUTE">On Route</option>
      <option value="COMPLETED">Completed</option>
      <option value="FAILED">Failed</option>
    </select>
  </div>

  <div class="filter-spacer"></div>

  <div class="filter-right-group">

    <!-- Search Filter -->
    <div class="filter-group search">
      <mat-icon class="filter-icon">search</mat-icon>
      <input type="text"
             formControlName="search"
             placeholder="Search orders..."
             class="filter-input search-input">
      <button mat-icon-button
              *ngIf="filterForm.get('search')?.value"
              (click)="clearSearch()"
              type="button"
              class="btn-clear-search">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <!-- Clear Button -->
    <button mat-button
            type="button"
            (click)="clearFilters()"
            [disabled]="!hasActiveFilters()"
            class="btn-clear">
      Clear
    </button>

    <!-- Refresh Button -->
    <button mat-icon-button
            type="button"
            (click)="onRefresh()"
            [matTooltip]="'Refresh data from server'"
            class="btn-refresh">
      <mat-icon>refresh</mat-icon>
    </button>

  </div>

</form>
